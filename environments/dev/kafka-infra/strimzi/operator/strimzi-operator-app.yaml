# Strimzi Kafka Operator — Dev
# Installs the Strimzi operator that manages Kafka, KafkaTopic, KafkaUser CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi-operator-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: de-platform
  source:
    repoURL: https://strimzi.io/charts/
    chart: strimzi-kafka-operator
    targetRevision: 0.39.0
    helm:
      values: |
        watchNamespaces: [kafka]
        logLevel: INFO
  destination:
    server: https://kubernetes.default.svc
    namespace: strimzi-operator
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
