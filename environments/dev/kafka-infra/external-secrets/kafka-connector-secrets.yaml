# =============================================================================
# EXTERNAL SECRETS — KAFKA CONNECTOR CREDENTIALS (DEV)
# =============================================================================
# Same structure as prod — points to dev-specific Secrets Manager paths.
# Dev DB endpoints are smaller RDS instances (db.t3.medium vs prod db.r5.2xlarge).
#
# Secrets Manager setup for dev:
#   aws secretsmanager create-secret \
#     --name de-platform/dev/kafka-connect/postgres-cdc \
#     --secret-string '{
#       "hostname": "<DEV_RDS_ENDPOINT>",
#       "port": "5432",
#       "username": "debezium_user",
#       "password": "<DEV_PASSWORD>"
#     }'
# =============================================================================

# ─── Dev PostgreSQL CDC Credentials ──────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-cdc-credentials
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-dev
    kind: ClusterSecretStore
  target:
    name: postgres-cdc-credentials
    creationPolicy: Owner
    deletionPolicy: Delete           # Dev: clean up when ExternalSecret is deleted
  data:
    - secretKey: hostname
      remoteRef:
        key: de-platform/dev/kafka-connect/postgres-cdc
        property: hostname
    - secretKey: port
      remoteRef:
        key: de-platform/dev/kafka-connect/postgres-cdc
        property: port
    - secretKey: username
      remoteRef:
        key: de-platform/dev/kafka-connect/postgres-cdc
        property: username
    - secretKey: password
      remoteRef:
        key: de-platform/dev/kafka-connect/postgres-cdc
        property: password

---
# ─── Dev MySQL CDC Credentials ────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql-cdc-credentials
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-dev
    kind: ClusterSecretStore
  target:
    name: mysql-cdc-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: hostname
      remoteRef:
        key: de-platform/dev/kafka-connect/mysql-cdc
        property: hostname
    - secretKey: port
      remoteRef:
        key: de-platform/dev/kafka-connect/mysql-cdc
        property: port
    - secretKey: username
      remoteRef:
        key: de-platform/dev/kafka-connect/mysql-cdc
        property: username
    - secretKey: password
      remoteRef:
        key: de-platform/dev/kafka-connect/mysql-cdc
        property: password

---
# ─── Dev Kafka Connect IRSA Service Account ──────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-connect-sa
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/KafkaConnectS3Role-Dev"
    eks.amazonaws.com/token-expiration: "86400"

---
# ─── Dev Slack Webhook (no PagerDuty in dev) ─────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-webhook-secret
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-dev
    kind: ClusterSecretStore
  target:
    name: slack-webhook-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: webhook-url
      remoteRef:
        key: de-platform/dev/alertmanager/slack-webhook-url
        property: webhook-url
