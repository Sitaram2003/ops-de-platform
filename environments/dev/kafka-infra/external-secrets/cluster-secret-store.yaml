# =============================================================================
# EXTERNAL SECRETS OPERATOR — CLUSTER SECRET STORE (DEV)
# =============================================================================
# Dev ClusterSecretStore — same structure as prod but points to dev secret paths.
# Dev IRSA role has narrower permissions: only de-platform/dev/* paths.
#
# Install ESO (same as prod — install once per cluster):
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets \
#     --set installCRDs=true \
#     --set serviceAccount.create=false \
#     --set serviceAccount.name=external-secrets-sa
# =============================================================================

# ─── Dev ESO IRSA Service Account ────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/ExternalSecretsOperatorRole-Dev"
    eks.amazonaws.com/token-expiration: "86400"

---
# ─── Dev ClusterSecretStore ───────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager-dev
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
  retrySettings:
    maxRetries: 5
    retryInterval: "10s"
