# =============================================================================
# FLINK OPERATOR — ArgoCD Application (Dev only)
# =============================================================================
# Dev-specific operator config — lower resource requests, DEBUG logging.
# (Prod operator defined in environments/prod/flink-infra/operator/)
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-operator-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: de-platform
    component: flink-operator
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: de-platform
  source:
    repoURL: https://downloads.apache.org/flink/flink-kubernetes-operator-1.8.0/
    chart: flink-kubernetes-operator
    targetRevision: 1.8.0
    helm:
      values: |
        resources:
          requests:
            memory: 128Mi
            cpu: "0.1"
          limits:
            memory: 256Mi
            cpu: "0.3"
        tolerations:
          - key: dedicated
            operator: Equal
            value: operators
            effect: NoSchedule
        watchNamespaces:
          - flink
        webhook:
          create: true
        defaultConfiguration:
          create: true
          append: true
          flink-conf.yaml: |+
            kubernetes.operator.reconcile.interval: 30s
            kubernetes.operator.observer.progress-check.interval: 15s

  destination:
    server: https://kubernetes.default.svc   # PLACEHOLDER: dev cluster API endpoint
    namespace: flink

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
