# =============================================================================
# FLINK RBAC — ServiceAccount + IRSA (Dev)
# =============================================================================
# Same pattern as prod — IRSA SA for S3 access.
# Dev uses a separate IAM role with access to dev S3 bucket only.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sa
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
  annotations:
    # PLACEHOLDER: replace with dev IAM role ARN
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/FlinkS3Role-Dev"
    eks.amazonaws.com/token-expiration: "86400"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-job-role
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["flink-processor", "de-kafka-cluster-cluster-ca-cert"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-job-rolebinding
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
subjects:
  - kind: ServiceAccount
    name: flink-sa
    namespace: flink
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: flink-job-role
