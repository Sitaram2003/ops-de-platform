# =============================================================================
# JOB 1: CLICKSTREAM PROCESSOR — Dev (reduced scale)
# =============================================================================
# Dev differences from prod:
#   • parallelism: 2 (vs 6) — fewer tasks, fits on 1 r5.xlarge node
#   • checkpoint interval: 120s (vs 60s) — less overhead in dev
#   • upgradeMode: stateless (vs savepoint) — dev doesn't need state preservation on restart
#   • minSize: 0 → flink-ng in dev starts at 0 nodes; KEDA activates from lag > 10
#   • S3 bucket: de-platform-dev-flink (separate from prod)
#
# Dev TM sizing (r5.xlarge: 4 vCPU, 32GB):
#   request=1c/4Gi, limit=2c/8Gi → 3 TMs per node (3×1c=3c < 3.72c; 3×8Gi=24Gi < 28Gi)
#   parallelism=2 → 1 TM (2 slots ÷ 2 = 1 TM). Single node spins up from 0.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: clickstream-processor-script
  namespace: flink
  labels:
    app.kubernetes.io/name: clickstream-processor
    app.kubernetes.io/part-of: de-platform
    environment: dev
data:
  clickstream_processor.py: |
    # Dev: same script as prod — no code changes between environments.
    # All environment-specific values (bootstrap servers, bucket, credentials)
    # are injected via environment variables in the FlinkDeployment spec below.
    #
    # To validate prod job logic in dev: just apply this file.
    # To test a new feature: edit this ConfigMap → ArgoCD syncs → Flink restarts.

    import os
    import logging
    from pyflink.table import EnvironmentSettings, TableEnvironment

    logging.basicConfig(
        level=logging.DEBUG,           # DEBUG in dev for easier troubleshooting
        format="%(asctime)s %(levelname)s [%(name)s] %(message)s",
    )
    log = logging.getLogger("clickstream-processor-dev")


    def main():
        settings = EnvironmentSettings.in_streaming_mode()
        t_env = TableEnvironment.create(settings)

        cfg = t_env.get_config()
        cfg.set("execution.checkpointing.interval", "120s")   # Less frequent in dev
        cfg.set("execution.checkpointing.mode", "EXACTLY_ONCE")
        cfg.set("state.backend", "rocksdb")
        cfg.set("state.backend.incremental", "true")
        cfg.set("state.backend.rocksdb.memory.managed", "true")
        cfg.set(
            "state.checkpoints.dir",
            f"s3://{os.environ['FLINK_S3_BUCKET']}/checkpoints/clickstream",
        )

        bootstrap = os.environ["KAFKA_BOOTSTRAP_SERVERS"]
        username = os.environ["KAFKA_USERNAME"]
        password = os.environ["KAFKA_PASSWORD"]

        sasl_jaas = (
            "org.apache.kafka.common.security.scram.ScramLoginModule required "
            f'username="{username}" password="{password}";'
        )

        t_env.execute_sql(f"""
            CREATE TABLE clickstream_raw (
                user_id       STRING,
                session_id    STRING,
                page          STRING,
                event_type    STRING,
                event_ts      BIGINT,
                row_time      AS TO_TIMESTAMP_LTZ(event_ts, 3),
                WATERMARK FOR row_time AS row_time - INTERVAL '10' SECOND
            ) WITH (
                'connector'                          = 'kafka',
                'topic'                              = 'app.clickstream.events',
                'properties.bootstrap.servers'       = '{bootstrap}',
                'properties.group.id'                = 'flink-clickstream-job',
                'properties.security.protocol'       = 'SASL_SSL',
                'properties.sasl.mechanism'          = 'SCRAM-SHA-512',
                'properties.sasl.jaas.config'        = '{sasl_jaas}',
                'properties.ssl.truststore.location' = '/opt/flink/certs/kafka-ca.p12',
                'properties.ssl.truststore.type'     = 'PKCS12',
                'properties.ssl.truststore.password' = 'changeit',
                'scan.startup.mode'                  = 'latest-offset',
                'format'                             = 'json',
                'json.fail-on-missing-field'         = 'false',
                'json.ignore-parse-errors'           = 'true'
            )
        """)

        t_env.execute_sql(f"""
            CREATE TABLE clickstream_1min (
                window_start  TIMESTAMP(3),
                window_end    TIMESTAMP(3),
                user_id       STRING,
                page          STRING,
                event_count   BIGINT,
                PRIMARY KEY (window_start, user_id, page) NOT ENFORCED
            ) WITH (
                'connector'                          = 'upsert-kafka',
                'topic'                              = 'analytics.clickstream.1min',
                'properties.bootstrap.servers'       = '{bootstrap}',
                'properties.security.protocol'       = 'SASL_SSL',
                'properties.sasl.mechanism'          = 'SCRAM-SHA-512',
                'properties.sasl.jaas.config'        = '{sasl_jaas}',
                'properties.ssl.truststore.location' = '/opt/flink/certs/kafka-ca.p12',
                'properties.ssl.truststore.type'     = 'PKCS12',
                'properties.ssl.truststore.password' = 'changeit',
                'key.format'                         = 'json',
                'value.format'                       = 'json'
            )
        """)

        log.info("[DEV] Starting clickstream window aggregation job.")

        stmt = t_env.create_statement_set()
        stmt.add_insert_sql("""
            INSERT INTO clickstream_1min
            SELECT
                window_start,
                window_end,
                user_id,
                page,
                COUNT(*) AS event_count
            FROM TABLE(
                TUMBLE(TABLE clickstream_raw, DESCRIPTOR(row_time), INTERVAL '1' MINUTE)
            )
            GROUP BY window_start, window_end, user_id, page
        """)

        stmt.execute().wait()


    if __name__ == "__main__":
        main()

---
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: clickstream-processor
  namespace: flink
  labels:
    app.kubernetes.io/name: clickstream-processor
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/flink-platform:1.18.1  # PLACEHOLDER
  imagePullPolicy: Always
  flinkVersion: v1_18
  serviceAccount: flink-sa

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
    state.backend: rocksdb
    state.backend.incremental: "true"
    state.checkpoints.dir: s3://de-platform-dev-flink/checkpoints/clickstream   # PLACEHOLDER dev bucket
    state.savepoints.dir: s3://de-platform-dev-flink/savepoints/clickstream
    execution.checkpointing.interval: "120000"   # 2min in dev — less overhead
    execution.checkpointing.mode: EXACTLY_ONCE
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249"
    s3.access-key: ""
    s3.secret-key: ""
    fs.s3a.aws.credentials.provider: com.amazonaws.auth.WebIdentityTokenCredentialsProvider

  podTemplate:
    spec:
      serviceAccountName: flink-sa
      tolerations:
        - key: dedicated
          operator: Equal
          value: flink
          effect: NoSchedule
      initContainers:
        - name: cert-converter
          image: eclipse-temurin:11-jre-alpine
          command:
            - sh
            - -c
            - |
              keytool -importcert -trustcacerts -noprompt \
                -alias kafka-ca \
                -file /certs-src/ca.crt \
                -keystore /opt/flink/certs/kafka-ca.p12 \
                -storetype PKCS12 \
                -storepass changeit
          volumeMounts:
            - name: kafka-ca-cert
              mountPath: /certs-src
              readOnly: true
            - name: flink-certs
              mountPath: /opt/flink/certs
      volumes:
        - name: clickstream-script
          configMap:
            name: clickstream-processor-script
        - name: kafka-ca-cert
          secret:
            secretName: de-kafka-cluster-cluster-ca-cert
        - name: flink-certs
          emptyDir: {}

  jobManager:
    resource:
      memory: "1024m"    # Dev JM: 1GB is sufficient
      cpu: 0.5
    podTemplate:
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: role
                      operator: In
                      values:
                        - flink
        env:
          - name: KAFKA_USERNAME
            valueFrom:
              secretKeyRef:
                name: flink-processor
                key: user
          - name: KAFKA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: flink-processor
                key: password
          - name: KAFKA_BOOTSTRAP_SERVERS
            value: "de-kafka-cluster-kafka-tls-bootstrap.kafka.svc:9093"
          - name: FLINK_S3_BUCKET
            value: "de-platform-dev-flink"
          - name: ENVIRONMENT
            value: "dev"
        volumeMounts:
          - name: clickstream-script
            mountPath: /opt/flink/scripts
          - name: flink-certs
            mountPath: /opt/flink/certs

  taskManager:
    resource:
      memory: "4096m"   # Dev TM: 4Gi request (r5.xlarge: 3 TMs per node at 4Gi/8Gi)
      cpu: 1
    podTemplate:
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: role
                      operator: In
                      values:
                        - flink
        containers:
          - name: flink-main-container
            resources:
              requests:
                memory: "4Gi"
                cpu: "1"
              limits:
                memory: "8Gi"    # 3×8Gi=24Gi < 28Gi allocatable on r5.xlarge ✓
                cpu: "2"
        env:
          - name: KAFKA_USERNAME
            valueFrom:
              secretKeyRef:
                name: flink-processor
                key: user
          - name: KAFKA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: flink-processor
                key: password
          - name: KAFKA_BOOTSTRAP_SERVERS
            value: "de-kafka-cluster-kafka-tls-bootstrap.kafka.svc:9093"
          - name: FLINK_S3_BUCKET
            value: "de-platform-dev-flink"
          - name: ENVIRONMENT
            value: "dev"
        volumeMounts:
          - name: clickstream-script
            mountPath: /opt/flink/scripts
          - name: flink-certs
            mountPath: /opt/flink/certs

  job:
    jarURI: local:///opt/flink/opt/flink-python_2.12-1.18.1.jar
    entryClass: org.apache.flink.client.python.PythonDriver
    args:
      - "-py"
      - "/opt/flink/scripts/clickstream_processor.py"
    parallelism: 2         # 2 tasks → 1 TM. Minimal for dev testing.
    upgradeMode: stateless  # Dev: no state preservation on restart (faster iteration)
    state: running
