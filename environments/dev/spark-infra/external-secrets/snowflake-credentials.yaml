# =============================================================================
# SNOWFLAKE CREDENTIALS — Spark namespace (Dev)
# =============================================================================
# Dev uses a dedicated Snowflake role with access limited to the DEV_DB database.
# Credentials are still managed via ESO so the dev cluster never has static
# secrets in plaintext.
#
# Store in AWS Secrets Manager at: de-platform/dev/snowflake/credentials
# JSON structure:
#   {
#     "account":  "xy12345.us-east-1",
#     "user":     "svc_spark_dev",
#     "password": "...",
#     "database": "DEV_DB",
#     "role":     "SPARK_DEV_ROLE"
#   }
#
# ClusterSecretStore: aws-secrets-manager-dev
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snowflake-credentials
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-dev
    kind: ClusterSecretStore
  target:
    name: snowflake-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: account
      remoteRef:
        key: de-platform/dev/snowflake/credentials
        property: account
    - secretKey: user
      remoteRef:
        key: de-platform/dev/snowflake/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: de-platform/dev/snowflake/credentials
        property: password
    - secretKey: database
      remoteRef:
        key: de-platform/dev/snowflake/credentials
        property: database
    - secretKey: role
      remoteRef:
        key: de-platform/dev/snowflake/credentials
        property: role
