# =============================================================================
# SPARK RBAC — ServiceAccount + IRSA + ExternalSecret (Dev)
# =============================================================================
# Same structure as prod but points to the dev IAM role and dev Secrets Manager path.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-sa
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/SparkS3SnowflakeRole-Dev"
    eks.amazonaws.com/token-expiration: "86400"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-job-role
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["snowflake-credentials"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-job-rolebinding
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
subjects:
  - kind: ServiceAccount
    name: spark-sa
    namespace: spark
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: spark-job-role

---
# ─── ExternalSecret: Snowflake credentials (Dev) ─────────────────────────────
# Create Secrets Manager entry before deploying:
#   aws secretsmanager create-secret \
#     --name de-platform/dev/spark/snowflake-credentials \
#     --secret-string '{"account":"...","user":"spark_svc_dev","password":"...","warehouse":"DEV_WH","database":"ANALYTICS_DEV","role":"SPARK_DEV_ROLE"}'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snowflake-credentials
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-dev
    kind: ClusterSecretStore
  target:
    name: snowflake-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: account
      remoteRef:
        key: de-platform/dev/spark/snowflake-credentials
        property: account
    - secretKey: user
      remoteRef:
        key: de-platform/dev/spark/snowflake-credentials
        property: user
    - secretKey: password
      remoteRef:
        key: de-platform/dev/spark/snowflake-credentials
        property: password
    - secretKey: warehouse
      remoteRef:
        key: de-platform/dev/spark/snowflake-credentials
        property: warehouse
    - secretKey: database
      remoteRef:
        key: de-platform/dev/spark/snowflake-credentials
        property: database
    - secretKey: role
      remoteRef:
        key: de-platform/dev/spark/snowflake-credentials
        property: role
