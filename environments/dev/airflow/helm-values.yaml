# =============================================================================
# AIRFLOW HELM VALUES — Dev
# =============================================================================
# Consumed by the ArgoCD multi-source Application in operator/airflow-app.yaml
# via $values/environments/dev/airflow/helm-values.yaml.
#
# Differences from prod:
#   - Resources halved (scheduler, webserver, triggerer, postgresql)
#   - PostgreSQL persistence disabled (emptyDir — faster pod restarts in dev)
#   - git-sync branch: main (same as staging/prod — trunk-based, envs differ by image tags)
#   - Remote logging disabled (keep logs local in dev)
# =============================================================================

executor: KubernetesExecutor

# ── Airflow config overrides ──────────────────────────────────────────────────
config:
  core:
    dags_are_paused_at_creation: "true"
    load_examples: "false"
    dags_folder: /opt/airflow/dags/repo/HEAD/dags
  kubernetes_executor:
    namespace: airflow
    worker_service_account_name: airflow-sa

# ── DAGs via git-sync ─────────────────────────────────────────────────────────
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/Sitaram2003/ops-de-jobs.git
    branch: main
    rev: HEAD
    depth: 1
    subPath: airflow
    period: 60s
    containerName: git-sync

env:
  - name: GIT_SYNC_USERNAME
    valueFrom:
      secretKeyRef:
        name: git-credentials
        key: GIT_SYNC_USERNAME
  - name: GIT_SYNC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: git-credentials
        key: GIT_SYNC_PASSWORD
  - name: GITSYNC_USERNAME
    valueFrom:
      secretKeyRef:
        name: git-credentials
        key: GITSYNC_USERNAME
  - name: GITSYNC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: git-credentials
        key: GITSYNC_PASSWORD
  # rest of your env vars...

# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Webserver ─────────────────────────────────────────────────────────────────
webserver:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: ops.dataeng@gmail.com
    firstName: Airflow
    lastName: Admin
    password: "Admin@123"

# ── Triggerer ─────────────────────────────────────────────────────────────────
triggerer:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ── Security ──────────────────────────────────────────────────────────────────
fernetKeySecretName: airflow-fernet-key
webserverSecretKeySecretName: airflow-webserver-secret

data:
  metadataSecretName: airflow-metadata-conn  
# ── PostgreSQL — emptyDir in dev (data lost on pod restart, intentional) ──────
postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
    tag: "16.1.0-debian-11-r15"
  auth:
    existingSecret: airflow-postgres-secret
    secretKeys:
      adminPasswordKey: postgres-password       # ← superuser
      userPasswordKey: postgresql-password      # ← app user
    username: "airflow"
    database: "airflow"
  primary:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
      allowPrivilegeEscalation: false

  primary:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
      allowPrivilegeEscalation: false

# ── Service account ───────────────────────────────────────────────────────────
serviceAccount:
  create: false
  name: airflow-sa

# ── Airflow Variables (injected as environment variables) ─────────────────────
env:
  - name: AIRFLOW_VAR_SPARK_DQ_REPORT_IMAGE
    value: "940507692220.dkr.ecr.ap-south-1.amazonaws.com/spark-dq-report:latest"
  - name: AIRFLOW_VAR_SPARK_CLICKSTREAM_AGG_IMAGE
    value: "940507692220.dkr.ecr.ap-south-1.amazonaws.com/spark-clickstream-agg:latest"
  - name: AIRFLOW_VAR_SPARK_TRANSACTION_ANALYTICS_IMAGE
    value: "940507692220.dkr.ecr.ap-south-1.amazonaws.com/spark-transaction-analytics:latest"

    
  - name: AIRFLOW_VAR_S3_DATA_LAKE_BUCKET
    value: "de-data-lake-dev"
  - name: AIRFLOW_VAR_SNOWFLAKE_WAREHOUSE
    value: "DEV_WAREHOUSE"
  - name: AIRFLOW_VAR_SPARK_EXECUTOR_INSTANCES
    value: "1"
  - name: AIRFLOW_VAR_SPARK_EXECUTOR_MEMORY
    value: "4g"
  - name: AIRFLOW_VAR_SPARK_EXECUTOR_CORES
    value: "1"
