# =============================================================================
# AIRFLOW EXTERNAL SECRETS — Dev
# =============================================================================
# Same four secrets as prod, pointing to the dev Secrets Manager paths.
# Uses ClusterSecretStore 'aws-secrets-manager-dev'.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-fernet-key
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: airflow-fernet-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: fernet-key
      remoteRef:
        key: de/dev/airflow/fernet-key
        property: fernet-key

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-webserver-secret
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: airflow-webserver-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: webserver-secret-key
      remoteRef:
        key: de/dev/airflow/webserver-secret
        property: webserver-secret-key

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-postgres-secret
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: airflow-postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: postgresql-password     # app user password
      remoteRef:
        key: de/dev/airflow/postgres
        property: postgresql-password
    - secretKey: postgres-password     # Admin user password
      remoteRef:
        key: de/dev/airflow/postgres
        property: postgres-password

---
# ─── Git-sync SSH deploy key ──────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-git-ssh
  namespace: airflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: airflow-git-ssh
    template:
      type: Opaque
      data: 
        gitSshKey: "{{ .raw_ssh_key }}"   # ← was ssh-privatekey
  data:
    - secretKey: raw_ssh_key
      remoteRef:
        key: de/dev/git-sync-ssh
        decodingStrategy: Base64

---
# Postgres connection string for metadata conn
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-metadata-conn
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: airflow-metadata-conn
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        connection: "postgresql+psycopg2://airflow:{{ .postgresPassword }}@airflow-postgresql:5432/airflow"
  data:
    - secretKey: postgresPassword
      remoteRef:
        key: de/dev/airflow/postgres
        property: postgresql-password
