---
# ─── Git-sync SSH deploy key ──────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-credentials
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
