# =============================================================================
# AIRFLOW EXTERNAL SECRETS — Dev
# =============================================================================
# Same four secrets as prod, pointing to the dev Secrets Manager paths.
# Uses ClusterSecretStore 'aws-secrets-manager-dev'.
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: airflow-fernet-key
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: dev
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-dev
    kind: ClusterSecretStore
  target:
    name: airflow-fernet-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: fernet-key
      remoteRef:
        key: de-platform/dev/airflow/fernet-key
        property: fernet-key

