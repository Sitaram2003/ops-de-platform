# =============================================================================
# AIRFLOW — ArgoCD Application (Dev)
# =============================================================================
# Dev Airflow — auto-sync on push to 'develop' branch.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: de-platform
    component: airflow
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: de-platform
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: 1.15.0
      helm:
        valueFiles:
          - $values/environments/dev/airflow/helm-values.yaml

    - repoURL: https://github.com/Sitaramu2003/ops-de-platform.git
      targetRevision: develop
      ref: values

  destination:
    server: https://kubernetes.default.svc   # PLACEHOLDER: dev cluster API endpoint
    namespace: airflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
