# =============================================================================
# SNOWFLAKE CREDENTIALS — Spark namespace (Prod)
# =============================================================================
# Airflow task pods build SparkApplication CRs that reference this secret via
# secretKeyRef. The Spark driver pod mounts these keys as environment variables:
#
#   SNOWFLAKE_ACCOUNT   → account identifier (e.g. xy12345.us-east-1)
#   SNOWFLAKE_USER      → service account user
#   SNOWFLAKE_PASSWORD  → service account password
#   SNOWFLAKE_DATABASE  → target database
#   SNOWFLAKE_ROLE      → role with read/write access to the target schemas
#
# Secret lives in the spark namespace because driver + executor pods run there.
# The airflow namespace never sees Snowflake credentials directly.
#
# Store in AWS Secrets Manager at: de-platform/prod/snowflake/credentials
# JSON structure:
#   {
#     "account":  "xy12345.us-east-1",
#     "user":     "svc_spark_prod",
#     "password": "...",
#     "database": "PROD_DB",
#     "role":     "SPARK_PROD_ROLE"
#   }
#
# ClusterSecretStore: aws-secrets-manager-prod
#   (defined in environments/prod/kafka-infra/external-secrets/cluster-secret-store.yaml)
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snowflake-credentials
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: snowflake-credentials
    creationPolicy: Owner
    deletionPolicy: Retain   # Never auto-delete — loss would break all Spark jobs
  data:
    - secretKey: account
      remoteRef:
        key: de-platform/prod/snowflake/credentials
        property: account
    - secretKey: user
      remoteRef:
        key: de-platform/prod/snowflake/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: de-platform/prod/snowflake/credentials
        property: password
    - secretKey: database
      remoteRef:
        key: de-platform/prod/snowflake/credentials
        property: database
    - secretKey: role
      remoteRef:
        key: de-platform/prod/snowflake/credentials
        property: role
