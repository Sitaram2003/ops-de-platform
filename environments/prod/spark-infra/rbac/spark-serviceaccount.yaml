# =============================================================================
# SPARK RBAC — ServiceAccount + IRSA + Role + ExternalSecret (Prod)
# =============================================================================
# Spark driver pods need:
#   1. S3 access  — read raw data lake, write aggregated results (via IRSA)
#   2. Snowflake  — JDBC credentials injected from K8s Secret `snowflake-credentials`
#                   (created by the ExternalSecret below)
#
# Credential flow (S3):
#   Driver/Executor pod → projected ServiceAccount token
#     → AWS STS AssumeRoleWithWebIdentity
#       → SparkS3SnowflakeRole-Prod (IAM role)
#         → s3://de-data-lake-prod/raw/* read
#         → s3://de-data-lake-prod/snowflake-staging/* read+write  (connector staging)
#         → s3://de-data-lake-prod/dq-reports/* write
#
# IAM role (create in Terraform/Console before deploying):
#   Trust policy subject: system:serviceaccount:spark:spark-sa
#   Permissions: s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket
#                on arn:aws:s3:::de-data-lake-prod/*
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-sa
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    # PLACEHOLDER: replace with actual IAM role ARN after Terraform apply
    # Trust policy condition: "system:serviceaccount:spark:spark-sa"
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/SparkS3SnowflakeRole-Prod"
    eks.amazonaws.com/token-expiration: "86400"   # 24h token rotation

---
# ─── Role: Spark driver needs these permissions within the spark namespace ────
# The spark-on-k8s-operator creates a broader cluster role for itself.
# This Role covers what the driver pod itself needs at runtime.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-job-role
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
rules:
  # Driver reads Snowflake credentials (populated by ESO ExternalSecret below)
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["snowflake-credentials"]
    verbs: ["get", "watch", "list"]

  # Driver reads ConfigMaps (job scripts, shared dq_utils)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]

  # Driver creates/watches executor pods (required by spark-on-k8s-operator architecture)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]

  # Driver creates services for executor-to-driver communication (shuffle, broadcast)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-job-rolebinding
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
subjects:
  - kind: ServiceAccount
    name: spark-sa
    namespace: spark
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: spark-job-role

---
# =============================================================================
# EXTERNAL SECRET — Snowflake Credentials (Prod)
# =============================================================================
# ESO reads from AWS Secrets Manager and creates K8s Secret `snowflake-credentials`
# in the spark namespace. Driver + executor pods mount it as env vars.
#
# Create Secrets Manager entry before deploying:
#   aws secretsmanager create-secret \
#     --name de-platform/prod/spark/snowflake-credentials \
#     --secret-string '{
#       "account":   "<ORG>-<ACCOUNT>",
#       "user":      "spark_svc",
#       "password":  "<SECURE_PASSWORD>",
#       "warehouse": "BATCH_WH",
#       "database":  "ANALYTICS",
#       "role":      "SPARK_ROLE"
#     }'
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snowflake-credentials
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-prod    # ClusterSecretStore defined in kafka-infra/external-secrets/
    kind: ClusterSecretStore

  target:
    name: snowflake-credentials       # K8s Secret name (referenced by SparkApplication env)
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: de-platform

  data:
    - secretKey: account
      remoteRef:
        key: de-platform/prod/spark/snowflake-credentials
        property: account

    - secretKey: user
      remoteRef:
        key: de-platform/prod/spark/snowflake-credentials
        property: user

    - secretKey: password
      remoteRef:
        key: de-platform/prod/spark/snowflake-credentials
        property: password

    - secretKey: warehouse
      remoteRef:
        key: de-platform/prod/spark/snowflake-credentials
        property: warehouse

    - secretKey: database
      remoteRef:
        key: de-platform/prod/spark/snowflake-credentials
        property: database

    - secretKey: role
      remoteRef:
        key: de-platform/prod/spark/snowflake-credentials
        property: role
