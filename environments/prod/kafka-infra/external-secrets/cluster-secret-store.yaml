# =============================================================================
# EXTERNAL SECRETS OPERATOR — CLUSTER SECRET STORE (PROD)
# =============================================================================
# ClusterSecretStore is cluster-scoped — any namespace can reference it.
# This single store points to AWS Secrets Manager in ap-south-1.
#
# Why ClusterSecretStore over SecretStore?
#   SecretStore is namespace-scoped — you'd need one per namespace.
#   ClusterSecretStore: one store, referenced by ExternalSecrets in any namespace.
#   More maintainable — one AWS region, one authentication config.
#
# Install ESO (via Helm, run BEFORE applying this file):
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets \
#     --set installCRDs=true \
#     --set serviceAccount.create=false \
#     --set serviceAccount.name=external-secrets-sa
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager-prod
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  provider:
    aws:
      service: SecretsManager        # AWS Secrets Manager (vs Parameter Store)
      region: ap-south-1

      # auth: use JWT from the IRSA ServiceAccount (no static AWS keys)
      # ESO reads the projected token from the pod filesystem and exchanges it
      # for temporary AWS credentials via STS AssumeRoleWithWebIdentity.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

  # retrySettings: how ESO handles transient Secrets Manager failures
  retrySettings:
    maxRetries: 5
    retryInterval: "10s"
