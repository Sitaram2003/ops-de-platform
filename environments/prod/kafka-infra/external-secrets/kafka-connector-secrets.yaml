# =============================================================================
# EXTERNAL SECRETS — KAFKA CONNECTOR CREDENTIALS (PROD)
# =============================================================================
# ESO reads credentials from AWS Secrets Manager and creates K8s Secrets.
# KafkaConnect uses these K8s Secrets via externalConfiguration.env
# (injected as environment variables into Connect worker pods).
# Connectors reference them as ${env:VAR_NAME} in their config.
#
# Secrets Manager setup (run once before deploying):
#   aws secretsmanager create-secret \
#     --name de-platform/prod/kafka-connect/postgres-cdc \
#     --secret-string '{
#       "hostname": "<RDS_ENDPOINT>",
#       "port": "5432",
#       "username": "debezium_user",
#       "password": "<SECURE_PASSWORD>"
#     }'
#
#   aws secretsmanager create-secret \
#     --name de-platform/prod/kafka-connect/mysql-cdc \
#     --secret-string '{
#       "hostname": "<RDS_ENDPOINT>",
#       "port": "3306",
#       "username": "debezium_user",
#       "password": "<SECURE_PASSWORD>"
#     }'
# =============================================================================

# ─── PostgreSQL CDC Credentials ───────────────────────────────────────────────
# Creates K8s Secret 'postgres-cdc-credentials' in kafka-connect namespace.
# KafkaConnect mounts this via externalConfiguration.env.
# Debezium connector uses ${env:POSTGRES_DB_HOSTNAME} etc. in its config.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-cdc-credentials
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "1h"              # Re-sync from Secrets Manager every hour
                                     # On secret rotation: updated within 1h (no pod restart needed)
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore

  target:
    name: postgres-cdc-credentials   # K8s Secret name (referenced by KafkaConnect)
    creationPolicy: Owner            # ESO owns this secret — deleted if ExternalSecret is deleted
    deletionPolicy: Retain           # On ExternalSecret delete: keep K8s Secret (safety)
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: de-platform

  data:
    # Map Secrets Manager JSON keys → K8s Secret keys
    - secretKey: hostname            # K8s Secret key name
      remoteRef:
        key: de-platform/prod/kafka-connect/postgres-cdc  # Secrets Manager path
        property: hostname           # JSON property within the secret

    - secretKey: port
      remoteRef:
        key: de-platform/prod/kafka-connect/postgres-cdc
        property: port

    - secretKey: username
      remoteRef:
        key: de-platform/prod/kafka-connect/postgres-cdc
        property: username

    - secretKey: password
      remoteRef:
        key: de-platform/prod/kafka-connect/postgres-cdc
        property: password

---
# ─── MySQL CDC Credentials ────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql-cdc-credentials
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: mysql-cdc-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: hostname
      remoteRef:
        key: de-platform/prod/kafka-connect/mysql-cdc
        property: hostname
    - secretKey: port
      remoteRef:
        key: de-platform/prod/kafka-connect/mysql-cdc
        property: port
    - secretKey: username
      remoteRef:
        key: de-platform/prod/kafka-connect/mysql-cdc
        property: username
    - secretKey: password
      remoteRef:
        key: de-platform/prod/kafka-connect/mysql-cdc
        property: password

---
# ─── Strimzi Kafka Connect — IRSA Service Account ─────────────────────────────
# Separate IRSA SA for the kafka-connect namespace.
# This SA allows Connect worker pods to write to S3 (for S3 Sink Connector)
# without any hardcoded AWS credentials.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-connect-sa
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    # PLACEHOLDER: replace with your actual IAM role ARN
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/KafkaConnectS3Role-Prod"
    eks.amazonaws.com/token-expiration: "86400"
