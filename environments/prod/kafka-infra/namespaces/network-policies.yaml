# =============================================================================
# NETWORK POLICIES — Kafka, Kafka Connect, Schema Registry, Monitoring (Prod)
# =============================================================================
# Strategy: default-deny ingress per namespace + targeted allow rules.
# Egress is NOT restricted — pods need egress to AWS services (S3, Secrets
# Manager, Snowflake, ECR) which are accessed via VPC endpoints. Locking
# egress here adds complexity without benefit in a private-subnet EKS cluster.
#
# Allow rules follow the principle of least privilege:
#   - Intra-namespace: pods in the same namespace can always talk to each other
#   - Prometheus scraping: monitoring ns → any ns on metrics ports
#   - Cross-namespace service calls: only explicitly named namespaces + ports
#
# sync-wave: "+5" (applied after operators and CRDs are up — avoids blocking
# bootstrap traffic during initial cluster setup)
# =============================================================================

# ─── KAFKA NAMESPACE ──────────────────────────────────────────────────────────

# Default deny: block all ingress from outside the kafka namespace.
# Only the explicit allow rules below are permitted.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}        # Applies to ALL pods in the kafka namespace
  policyTypes: [Ingress]

---
# Allow intra-namespace: Kafka brokers ↔ controllers (Raft: 9093, replication: 9091)
# Also allows Strimzi operator → broker management API calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}    # Any pod in the same (kafka) namespace

---
# Allow Kafka Connect workers to reach Kafka brokers (TLS port 9093).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-kafka-connect
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector:
    matchLabels:
      strimzi.io/kind: Kafka    # Kafka broker pods
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka-connect
      ports:
        - port: 9093
          protocol: TCP

---
# Allow Prometheus (monitoring namespace) to scrape Kafka JMX metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9096    # Kafka JMX exporter (set by strimzi metricsConfig)
          protocol: TCP
        - port: 9404    # Strimzi kafka exporter
          protocol: TCP

---
# ─── KAFKA CONNECT NAMESPACE ──────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}    # Connect worker REST API + coordinator communication

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9096    # Connect JMX exporter
          protocol: TCP

---
# ─── SCHEMA REGISTRY NAMESPACE ───────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: schema-registry
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: schema-registry
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}

---
# Schema Registry is called by: Kafka Connect (producing with Avro/Protobuf),
# Flink (deserialization), and Spark (reading schema-encoded topics).
# All consume port 8081 (REST API for schema fetch/register).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-schema-consumers
  namespace: schema-registry
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka-connect
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flink
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: spark
      ports:
        - port: 8081
          protocol: TCP

---
# Prometheus scrapes schema-registry health + metrics on port 8081 (/metrics endpoint)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: schema-registry
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8081
          protocol: TCP

---
# ─── MONITORING NAMESPACE ─────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
# Allow all intra-namespace: Grafana → Prometheus (9090), Grafana → Alertmanager (9093),
# Prometheus → Alertmanager, kube-state-metrics → Prometheus, etc.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}

---
# Allow Grafana dashboard access from any namespace (engineers + ingress controller).
# Port 3000 is the Grafana web UI. In production you'd restrict this to the
# ingress controller namespace; keeping it open here for kubectl port-forward access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ui
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes: [Ingress]
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
        # Allow any source — no namespaceSelector/podSelector means any pod or
        # external IP (after NodePort/LoadBalancer routing) can reach Grafana UI
</content>
