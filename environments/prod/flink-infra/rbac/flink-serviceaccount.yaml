# =============================================================================
# FLINK RBAC — ServiceAccount + IRSA (Prod)
# =============================================================================
# Flink pods need:
#   1. S3 access  — checkpoints + savepoints (via IRSA, no static keys)
#   2. Flink Operator RBAC — operator creates/deletes pods on behalf of FlinkDeployment
#
# Credential flow (same pattern as Kafka Connect IRSA):
#   FlinkDeployment pod → projected ServiceAccount token
#     → AWS STS AssumeRoleWithWebIdentity
#       → FlinkS3Role-Prod (IAM role)
#         → s3://de-platform-prod-flink/* read/write
#
# IAM role must be created separately (Terraform or AWS Console):
#   Trust policy: eks.amazonaws.com/role-arn annotation on this ServiceAccount
#   Permissions: s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket
#                on arn:aws:s3:::de-platform-prod-flink/*
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sa
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
  annotations:
    # PLACEHOLDER: replace with actual IAM role ARN after creating in Terraform/Console
    # Trust policy must include:
    #   Principal: { "Federated": "arn:aws:iam::123456789012:oidc-provider/..." }
    #   Condition: { StringEquals: { "...aud": "sts.amazonaws.com", "...sub": "system:serviceaccount:flink:flink-sa" }}
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/FlinkS3Role-Prod"
    eks.amazonaws.com/token-expiration: "86400"  # 24h token rotation

---
# ─── Role: Flink Operator needs these permissions to manage Flink pods ────────
# The Flink Operator creates this role automatically when it installs. This is a
# SUPPLEMENTAL role for job-specific actions: reading Kafka secrets, accessing PVCs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-job-role
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
rules:
  # Read Kafka SCRAM credentials (created by Strimzi KafkaUser CR 'flink-processor')
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["flink-processor", "de-kafka-cluster-cluster-ca-cert"]
    verbs: ["get", "watch", "list"]

  # Read ConfigMaps (job scripts, Flink config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]

  # Read PVCs (for RocksDB local state — only if using local persistent state)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-job-rolebinding
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
subjects:
  - kind: ServiceAccount
    name: flink-sa
    namespace: flink
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: flink-job-role
