# =============================================================================
# AIRFLOW EXTERNAL SECRETS — Prod
# =============================================================================
# Four secrets required by the Airflow Helm chart / git-sync sidecar:
#
#   airflow-fernet-key       → fernetKeySecretName
#     Encrypts sensitive DAG variables and Connections stored in the metadata DB.
#     Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#     Store at: de-platform/prod/airflow/fernet-key
#
#   airflow-webserver-secret → webserverSecretKeySecretName
#     Signs Flask session cookies and CSRF tokens.
#     Generate with: python -c "import os; print(os.urandom(16).hex())"
#     Store at: de-platform/prod/airflow/webserver-secret
#
#   airflow-postgres-secret  → postgresql.auth.existingSecret
#     Embedded PostgreSQL admin password.
#     Store at: de-platform/prod/airflow/postgres
#
#   git-credentials          → dags.gitSync.sshKeySecret
#     SSH deploy key (read-only) for the de-platform repo.
#     Add the public key as a GitHub deploy key on the repo (read-only).
#     Generate with: ssh-keygen -t ed25519 -C "airflow-git-sync-prod"
#     Store private key at: de-platform/prod/airflow/git-ssh-key  (key: gitSshKey)
#     The key name gitSshKey must match what the git-sync sidecar expects.
#
# All four use the ClusterSecretStore already in place:
#   environments/prod/kafka-infra/external-secrets/cluster-secret-store.yaml
#   (name: aws-secrets-manager-prod)
# =============================================================================

# ─── Fernet key ───────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: airflow-fernet-key
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: airflow-fernet-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: fernet-key            # K8s Secret key name
      remoteRef:
        key: de-platform/prod/airflow/fernet-key
        property: fernet-key           # JSON property in Secrets Manager

---
# ─── Webserver secret key ─────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: airflow-webserver-secret
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: airflow-webserver-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: webserver-secret-key
      remoteRef:
        key: de-platform/prod/airflow/webserver-secret
        property: webserver-secret-key

---
# ─── PostgreSQL password ──────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: airflow-postgres-secret
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: airflow-postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain    # Retain on ESO deletion — losing the DB password is unrecoverable
  data:
    - secretKey: postgresql-password   # Must match postgresql.auth.secretKeys.adminPasswordKey
      remoteRef:
        key: de-platform/prod/airflow/postgres
        property: postgresql-password

---
# ─── Git-sync SSH deploy key ──────────────────────────────────────────────────
# Read-only deploy key for the de-platform GitHub repo.
# git-sync expects the secret to contain a key named 'gitSshKey' (PEM format).
# Add the corresponding public key as a Deploy Key on GitHub (read-only).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-credentials
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: prod
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: git-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: gitSshKey             # Key name expected by the git-sync sidecar
      remoteRef:
        key: de-platform/prod/airflow/git-ssh-key
        property: gitSshKey
</content>
