# =============================================================================
# STAGING KAFKA CONNECT CLUSTER
# =============================================================================
# 2 workers — between dev (1) and prod (3).
# =============================================================================

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: de-connect-cluster
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    strimzi.io/use-connector-resources: "true"

spec:
  version: 3.7.0
  replicas: 2

  bootstrapServers: de-kafka-cluster-kafka-tls-bootstrap.kafka:9093

  tls:
    trustedCertificates:
      - secretName: de-kafka-cluster-cluster-ca-cert
        certificate: ca.crt

  authentication:
    type: scram-sha-512
    username: kafka-connect-user
    passwordSecret:
      secretName: kafka-connect-user
      password: password

  config:
    config.storage.topic: connect-configs
    config.storage.replication.factor: 3
    offset.storage.topic: connect-offsets
    offset.storage.replication.factor: 3
    offset.storage.partitions: 10
    status.storage.topic: connect-status
    status.storage.replication.factor: 3
    status.storage.partitions: 5
    key.converter: io.confluent.kafka.serializers.KafkaAvroSerializer
    key.converter.schema.registry.url: http://apicurio-registry.schema-registry.svc:8080/apis/ccompat/v6
    value.converter: io.confluent.kafka.serializers.KafkaAvroSerializer
    value.converter.schema.registry.url: http://apicurio-registry.schema-registry.svc:8080/apis/ccompat/v6
    key.converter.schemas.enable: "false"
    value.converter.schemas.enable: "false"
    offset.flush.interval.ms: 10000
    producer.override.acks: all
    producer.override.compression.type: lz4
    consumer.override.fetch.min.bytes: 65536
    consumer.override.auto.offset.reset: earliest
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider

  externalConfiguration:
    env:
      - name: POSTGRES_DB_HOSTNAME
        valueFrom:
          secretKeyRef:
            name: postgres-cdc-credentials
            key: hostname
      - name: POSTGRES_DB_PORT
        valueFrom:
          secretKeyRef:
            name: postgres-cdc-credentials
            key: port
      - name: POSTGRES_DB_USERNAME
        valueFrom:
          secretKeyRef:
            name: postgres-cdc-credentials
            key: username
      - name: POSTGRES_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: postgres-cdc-credentials
            key: password
      - name: MYSQL_DB_HOSTNAME
        valueFrom:
          secretKeyRef:
            name: mysql-cdc-credentials
            key: hostname
      - name: MYSQL_DB_PORT
        valueFrom:
          secretKeyRef:
            name: mysql-cdc-credentials
            key: port
      - name: MYSQL_DB_USERNAME
        valueFrom:
          secretKeyRef:
            name: mysql-cdc-credentials
            key: username
      - name: MYSQL_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysql-cdc-credentials
            key: password

  build:
    output:
      type: docker
      image: "123456789012.dkr.ecr.ap-south-1.amazonaws.com/de-kafka-connect:staging-latest"
    plugins:
      - name: debezium-postgres-connector
        artifacts:
          - type: maven
            group: io.debezium
            artifact: debezium-connector-postgres
            version: 2.6.2.Final
      - name: debezium-mysql-connector
        artifacts:
          - type: maven
            group: io.debezium
            artifact: debezium-connector-mysql
            version: 2.6.2.Final
      - name: kafka-connect-s3
        artifacts:
          - type: maven
            group: io.confluent
            artifact: kafka-connect-s3
            version: 10.7.4
      - name: kafka-connect-avro-converter
        artifacts:
          - type: maven
            group: io.confluent
            artifact: kafka-connect-avro-converter
            version: 7.6.1

  resources:
    requests:
      memory: 4Gi
      cpu: "1"
    limits:
      memory: 8Gi
      cpu: "3"

  jvmOptions:
    -Xms: 1024m
    -Xmx: 4096m
    gcLoggingEnabled: false

  template:
    pod:
      serviceAccountName: kafka-connect-sa
      tolerations:
        - key: dedicated
          operator: Equal
          value: kafka-connect
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: de-connect-cluster
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - kafka-connect
