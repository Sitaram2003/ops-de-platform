# =============================================================================
# NETWORK POLICIES — Staging
# =============================================================================
# Identical structure to prod — default-deny ingress + targeted allow rules.
# staging label applied throughout for easy filtering.
# =============================================================================

# ─── KAFKA NAMESPACE ──────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-kafka-connect
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector:
    matchLabels:
      strimzi.io/kind: Kafka
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka-connect
      ports:
        - port: 9093
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9096
          protocol: TCP
        - port: 9404
          protocol: TCP

---
