# =============================================================================
# EXTERNAL SECRETS — KAFKA CONNECTOR CREDENTIALS (Staging)
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-cdc-credentials
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-staging
    kind: ClusterSecretStore
  target:
    name: postgres-cdc-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: de-platform
  data:
    - secretKey: hostname
      remoteRef:
        key: de-platform/staging/kafka-connect/postgres-cdc
        property: hostname
    - secretKey: port
      remoteRef:
        key: de-platform/staging/kafka-connect/postgres-cdc
        property: port
    - secretKey: username
      remoteRef:
        key: de-platform/staging/kafka-connect/postgres-cdc
        property: username
    - secretKey: password
      remoteRef:
        key: de-platform/staging/kafka-connect/postgres-cdc
        property: password

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql-cdc-credentials
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-staging
    kind: ClusterSecretStore
  target:
    name: mysql-cdc-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: hostname
      remoteRef:
        key: de-platform/staging/kafka-connect/mysql-cdc
        property: hostname
    - secretKey: port
      remoteRef:
        key: de-platform/staging/kafka-connect/mysql-cdc
        property: port
    - secretKey: username
      remoteRef:
        key: de-platform/staging/kafka-connect/mysql-cdc
        property: username
    - secretKey: password
      remoteRef:
        key: de-platform/staging/kafka-connect/mysql-cdc
        property: password

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-connect-sa
  namespace: kafka-connect
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/KafkaConnectS3Role-Staging"
    eks.amazonaws.com/token-expiration: "86400"
