# Staging Kafka Users — same users as prod, environment: staging label
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: clickstream-producer
  namespace: kafka
  labels:
    strimzi.io/cluster: de-kafka-cluster
    app.kubernetes.io/part-of: de-platform
    team: platform
    environment: staging
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: app.clickstream.events
          patternType: literal
        operations:
          - Write
          - Describe
        host: "*"
      - resource:
          type: transactionalId
          name: clickstream-txn-
          patternType: prefix
        operations:
          - Write
        host: "*"

