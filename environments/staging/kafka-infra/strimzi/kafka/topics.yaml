# =============================================================================
# STAGING KAFKA TOPICS
# =============================================================================
# Intermediate partition counts between dev (12) and prod (120/240).
# RF=3, min.isr=2 to match prod durability guarantees.
# No tiered storage (staging does not use S3 cold tier).
# =============================================================================

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: app-clickstream-events
  namespace: kafka
  labels:
    strimzi.io/cluster: de-kafka-cluster
    app.kubernetes.io/part-of: de-platform
    source: clickstream
    environment: staging
spec:
  topicName: app.clickstream.events
  partitions: 30     # Between dev (12) and prod (120)
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "259200000"   # 3 days
    cleanup.policy: delete
    compression.type: lz4
    max.message.bytes: "10485760"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cdc-transactions-db
  namespace: kafka
  labels:
    strimzi.io/cluster: de-kafka-cluster
    app.kubernetes.io/part-of: de-platform
    source: cdc
    environment: staging
spec:
  topicName: cdc.postgres-app-db
  partitions: 15     # Between dev (6) and prod (60)
  replicas: 3
  config:
    min.insync.replicas: "2"
    cleanup.policy: compact,delete
    segment.ms: "3600000"
    delete.retention.ms: "86400000"
    min.cleanable.dirty.ratio: "0.5"
    max.message.bytes: "5242880"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: gps-location-events
  namespace: kafka
  labels:
    strimzi.io/cluster: de-kafka-cluster
    app.kubernetes.io/part-of: de-platform
    source: gps
    environment: staging
spec:
  topicName: app.gps.location.events
  partitions: 30
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "86400000"   # 1 day
    cleanup.policy: delete
    compression.type: lz4
    max.message.bytes: "1048576"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: microservice-events
  namespace: kafka
  labels:
    strimzi.io/cluster: de-kafka-cluster
    app.kubernetes.io/part-of: de-platform
    source: microservices
    environment: staging
spec:
  topicName: app.microservice.events
  partitions: 15
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "259200000"   # 3 days
    cleanup.policy: delete
    compression.type: lz4
    max.message.bytes: "5242880"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: dlq-cdc-postgres
  namespace: kafka
  labels:
    strimzi.io/cluster: de-kafka-cluster
    app.kubernetes.io/part-of: de-platform
    environment: staging
spec:
  topicName: dlq.cdc.postgres-app-db
  partitions: 3
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "2592000000"  # 30 days
    cleanup.policy: delete
    max.message.bytes: "10485760"

---
apiVersion: kafka.strimzi.io/v1beta2
