# Flink Operator — Staging ArgoCD Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-operator-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: de-platform
    component: flink-operator
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: de-platform
  source:
    repoURL: https://downloads.apache.org/flink/flink-kubernetes-operator-1.8.0/
    chart: flink-kubernetes-operator
    targetRevision: 1.8.0
    helm:
      parameters:
        - name: watchNamespaces
          value: flink
        - name: operatorConfiguration.reconcilerRescheduleInterval
          value: 30s
        - name: resources.requests.memory
          value: 256Mi
        - name: resources.requests.cpu
          value: 250m
        - name: resources.limits.memory
          value: 512Mi
        - name: resources.limits.cpu
          value: 500m
  destination:
    server: https://kubernetes.default.svc
    namespace: flink
  syncPolicy:
    automated: null   # Manual sync
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
