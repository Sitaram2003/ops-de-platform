# =============================================================================
# NETWORK POLICIES — Flink Namespace (Staging)
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 6123
          protocol: TCP
        - port: 6124
          protocol: TCP
        - port: 8081
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: flink
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: de-platform
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9249
          protocol: TCP
