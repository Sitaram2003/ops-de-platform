# =============================================================================
# SNOWFLAKE CREDENTIALS — Spark namespace (Staging)
# =============================================================================
# Same structure as prod. Staging uses a separate Snowflake role and database
# to prevent staging jobs from touching production data.
#
# Store in AWS Secrets Manager at: de-platform/staging/snowflake/credentials
# JSON structure:
#   {
#     "account":  "xy12345.us-east-1",
#     "user":     "svc_spark_staging",
#     "password": "...",
#     "database": "STAGING_DB",
#     "role":     "SPARK_STAGING_ROLE"
#   }
#
# ClusterSecretStore: aws-secrets-manager-staging
#   (should mirror aws-secrets-manager-prod for the staging cluster)
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snowflake-credentials
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-staging
    kind: ClusterSecretStore
  target:
    name: snowflake-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: account
      remoteRef:
        key: de-platform/staging/snowflake/credentials
        property: account
    - secretKey: user
      remoteRef:
        key: de-platform/staging/snowflake/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: de-platform/staging/snowflake/credentials
        property: password
    - secretKey: database
      remoteRef:
        key: de-platform/staging/snowflake/credentials
        property: database
    - secretKey: role
      remoteRef:
        key: de-platform/staging/snowflake/credentials
        property: role
