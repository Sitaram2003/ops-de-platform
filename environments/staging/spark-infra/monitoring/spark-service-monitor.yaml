apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spark-operator-service-monitor
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
    prometheus: kube-prometheus
spec:
  namespaceSelector:
    matchNames:
      - spark
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-operator
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        - targetLabel: environment
          replacement: staging
