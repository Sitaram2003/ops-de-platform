# =============================================================================
# NETWORK POLICIES — Spark Namespace (Staging)
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 7078
          protocol: TCP
        - port: 7079
          protocol: TCP
        - port: 4040
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "+5"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spark-operator
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 10254
          protocol: TCP
