# =============================================================================
# SPARK RBAC — ServiceAccount + IRSA (Staging)
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-sa
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/SparkS3SnowflakeRole-Staging"
    eks.amazonaws.com/token-expiration: "86400"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-job-role
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["snowflake-credentials"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-job-rolebinding
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
subjects:
  - kind: ServiceAccount
    name: spark-sa
    namespace: spark
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: spark-job-role

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snowflake-credentials
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager-staging
    kind: ClusterSecretStore
  target:
    name: snowflake-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: de-platform
  data:
    - secretKey: account
      remoteRef:
        key: de-platform/staging/spark/snowflake-credentials
        property: account
    - secretKey: user
      remoteRef:
        key: de-platform/staging/spark/snowflake-credentials
        property: user
    - secretKey: password
      remoteRef:
        key: de-platform/staging/spark/snowflake-credentials
        property: password
    - secretKey: warehouse
      remoteRef:
        key: de-platform/staging/spark/snowflake-credentials
        property: warehouse
    - secretKey: database
      remoteRef:
        key: de-platform/staging/spark/snowflake-credentials
        property: database
    - secretKey: role
      remoteRef:
        key: de-platform/staging/spark/snowflake-credentials
        property: role
