# =============================================================================
# AIRFLOW EXTERNAL SECRETS — Staging
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: airflow-fernet-key
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: aws-secrets-manager-staging
    kind: ClusterSecretStore
  target:
    name: airflow-fernet-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: fernet-key
      remoteRef:
        key: de-platform/staging/airflow/fernet-key
        property: fernet-key

