# =============================================================================
# AIRFLOW RBAC — ServiceAccount + Roles (Staging)
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-sa
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow-sa
    app.kubernetes.io/part-of: de-platform
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/AirflowRole-Staging"
    eks.amazonaws.com/token-expiration: "86400"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-worker-role
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, delete, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-worker-rolebinding
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
subjects:
  - kind: ServiceAccount
    name: airflow-sa
    namespace: airflow
roleRef:
  kind: Role
  name: airflow-worker-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-spark-submitter
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: [sparkapplications]
    verbs: [create, get, list, watch, delete, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-spark-submitter-rolebinding
  namespace: spark
  labels:
    app.kubernetes.io/part-of: de-platform
    environment: staging
subjects:
  - kind: ServiceAccount
    name: airflow-sa
    namespace: airflow
roleRef:
  kind: Role
  name: airflow-spark-submitter
  apiGroup: rbac.authorization.k8s.io
